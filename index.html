<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AltarFlow Elite | Sovereign Edition 2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #007AFF;
            --accent: #ffd700;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        /* --- Sovereign UI Components --- */
        .glass {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            margin-bottom: 25px;
            transition: 0.3s;
        }

        .search-box { display: flex; gap: 12px; margin-bottom: 20px; }
        input, select {
            background: rgba(0,0,0,0.6); border: 1px solid var(--border);
            color: white; padding: 18px; border-radius: 18px; font-size: 1rem; outline: none;
        }
        input { flex: 1; }

        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
        button {
            padding: 14px; border: none; border-radius: 15px;
            background: var(--glass); color: white; font-weight: 600;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        button:hover { background: rgba(255,255,255,0.1); transform: translateY(-3px); }
        .btn-gold { background: var(--gold); color: #000; }

        /* --- Display Engine --- */
        #display-area { text-align: center; padding: 40px 0; }
        .v-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 3rem);
            line-height: 1.2; margin-bottom: 20px; font-weight: 700;
        }
        .v-ref { color: var(--primary); font-weight: 800; letter-spacing: 4px; text-transform: uppercase; }

        /* --- THEOLOGICAL INSIGHT PANEL --- */
        .insight-panel {
            display: none;
            margin-top: 30px;
            padding: 25px;
            border-radius: 20px;
            background: rgba(0, 122, 255, 0.1);
            border-left: 5px solid var(--primary);
            text-align: left;
            animation: fadeIn 0.5s ease;
        }
        .insight-title { color: var(--accent); font-weight: 800; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px; }
        .lexicon-box { font-family: serif; font-style: italic; color: #aaa; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }

        /* --- Overlays --- */
        #broadcast-layer { position: fixed; bottom: 40px; width: 94%; left: 3%; display: none; z-index: 9999; }
        .lt-box { background: rgba(0,0,0,0.95); border-left: 10px solid var(--primary); padding: 30px; border-radius: 8px; }

        footer { text-align: center; margin-top: 80px; opacity: 0.4; font-size: 0.75rem; border-top: 1px solid var(--border); padding-top: 20px; }
        .signature { font-style: italic; margin-top: 5px; color: var(--primary); }

        @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
    <link rel="stylesheet" href="animations.css">
</style>
</head>
<body>

    <div class="container">
        <header style="text-align:center; margin-bottom: 40px;">
            <h1 style="font-weight:900; font-size:3rem; letter-spacing:-2px;">AltarFlow <span style="color:var(--primary)">Elite</span></h1>
            <p style="opacity:0.6; letter-spacing:3px; font-size:0.7rem;">SOVEREIGN THEOLOGICAL INTELLIGENCE</p>
        </header>

        <div class="glass">
            <div class="search-box">
                <input type="text" id="mainInput" placeholder="Enter Reference or Phrase (e.g. 'In the beginning was the word')..." onkeypress="checkEnter(event)">
                <select id="versionSelect">
                    <option value="kjv">KJV</option>
                    <option value="asv">ASV</option>
                    <option value="web">WEB</option>
                </select>
            </div>

            <div class="controls">
                <button class="btn-gold" onclick="fetchVerse()">⚡ Reveal</button>
                <button onclick="startVoice()">🎤 Voice</button>
                <button onclick="toggleInsight()">📖 Interpretation</button>
                <button onclick="toggleLT()">📺 Broadcast</button>
                <button onclick="toggleFS()">🖼 Fullscreen</button>
                <button onclick="copyVerse()">📋 Copy</button>
            </div>

            <div id="display-area">
                <div id="vText" class="v-text">Behold, I make all things new.</div>
                <div id="vRef" class="v-ref">AltarFlow Sovereign 2026</div>

                <div id="insightPanel" class="insight-panel">
                    <div class="insight-title">✨ Divine Insight & Interpretation</div>
                    <div id="interpretationContent">Searching the spiritual context...</div>
                    <div class="lexicon-box" id="lexiconContent"></div>
                </div>
            </div>
        </div>

        <footer>
            &copy; 2026 BODY OF CHRIST INTL | SOVEREIGN JURISDICTION
            <div class="signature">Architect: Kyrie Chirombedzi</div>
        </footer>
    </div>

    <div id="broadcast-layer"></div>
    <div id="fs-layer" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:10000; flex-direction:column; justify-content:center; align-items:center; padding:60px; text-align:center;">
        <div id="fsText" class="v-text" style="font-size:3.5rem;"></div>
        <div id="fsRef" class="v-ref" style="font-size:1.5rem;"></div>
        <button onclick="toggleFS()" style="position:fixed; top:40px; right:40px; background:white; color:black;">EXIT</button>
    </div>

    <script>
        let currentVerse = { text: "", ref: "", interpretation: "", lexicon: "" };

        // 1. Core Theological Engine
        async function fetchVerse() {
            const query = document.getElementById('mainInput').value;
            const version = document.getElementById('versionSelect').value;
            if(!query) return;

            document.getElementById('vText').innerText = "Consulting the Scrolls...";
            
            try {
                // Primary Fetch
                let res = await fetch(`https://bible-api.com/${query}?translation=${version}`);
                let data = await res.json();

                if(!data.text) {
                    // Search Fallback
                    const sRes = await fetch(`https://bible-api.com/search?q=${encodeURIComponent(query)}`);
                    const sData = await sRes.json();
                    const top = sData.verses[0];
                    const fRes = await fetch(`https://bible-api.com/${top.book_name}+${top.chapter}:${top.verse}?translation=${version}`);
                    data = await fRes.json();
                }

                updateUI(data);
            } catch (e) {
                document.getElementById('vText').innerText = "Connection to the cloud interrupted.";
            }
        }

        function updateUI(data) {
            currentVerse.text = data.text.trim();
            currentVerse.ref = data.reference;
            
            document.getElementById('vText').innerText = `"${currentVerse.text}"`;
            document.getElementById('vRef').innerText = currentVerse.ref;

            // Generate "Paid-Version" Style Interpretation
            generateInterpretation(currentVerse.ref, currentVerse.text);
        }

        // 2. The Interpretation Logic (The "Jesus is the Word" feature)
        function generateInterpretation(ref, text) {
            let interpretation = "This scripture emphasizes the divine nature of God's plan.";
            let lexicon = "";

            if(ref.includes("John 1:1")) {
                interpretation = "The 'Word' used here is the Greek 'Logos'. This refers directly to Jesus Christ as the eternal, creative expression of God. To say the Word was with God is to confirm Jesus' pre-existence before creation.";
                lexicon = "Greek: Λόγος (Logos) — The Divine Reason, the Mind of God expressed.";
            } else if(ref.includes("Genesis 1:1")) {
                interpretation = "Creation began by the spoken command of God. Hebrew scholars note that 'Elohim' is plural, hinting at the Trinity present at the very beginning.";
                lexicon = "Hebrew: בְּרֵאשִׁית (Bereshit) — In the beginning / At the head of all things.";
            } else if (text.toLowerCase().includes("love")) {
                interpretation = "This verse highlights 'Agape'—unconditional, sacrificial love that acts regardless of feelings.";
                lexicon = "Greek: ἀγάπη (Agape) — Highest form of love; charity.";
            } else {
                interpretation = "Standard Interpretation: This passage serves as a foundation for living a life of faith and alignment with the Creator's purpose.";
                lexicon = "Study Note: Observe the verbs in this verse to understand the action God is requiring of the believer.";
            }

            document.getElementById('interpretationContent').innerText = interpretation;
            document.getElementById('lexiconContent').innerText = lexicon;
        }

        // 3. UI Controls
        function toggleInsight() {
            const panel = document.getElementById('insightPanel');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        function toggleLT() {
            const layer = document.getElementById('broadcast-layer');
            if(layer.style.display === 'block') { layer.style.display = 'none'; }
            else {
                layer.style.display = 'block';
                layer.innerHTML = `<div class="lt-box"><h2>${currentVerse.text}</h2><p class="v-ref" style="margin-top:10px;">${currentVerse.ref}</p></div>`;
            }
        }

        function toggleFS() {
            const fs = document.getElementById('fs-layer');
            if(fs.style.display === 'flex') { fs.style.display = 'none'; }
            else {
                fs.style.display = 'flex';
                document.getElementById('fsText').innerText = `"${currentVerse.text}"`;
                document.getElementById('fsRef').innerText = currentVerse.ref;
            }
        }

        function startVoice() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRec) return alert("Voice recognition not supported.");
            const rec = new SpeechRec();
            rec.onresult = (e) => {
                const t = e.results[0][0].transcript;
                document.getElementById('mainInput').value = t;
                fetchVerse();
            };
            rec.start();
        }

        function copyVerse() {
            navigator.clipboard.writeText(`"${currentVerse.text}" — ${currentVerse.ref}`);
            alert("Scripture & Reference Copied.");
        }

        function checkEnter(e) { if(e.key === 'Enter') fetchVerse(); }
    </script>
</body>
</html>
