<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AltarFlow Sovereign 2026 | BOC Intl</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
:root { --gold: linear-gradient(90deg, #d4af37, #f7ef8a, #d4af37); --accent-blue: #1f80ff; --bg-dark: #0a0a0a; --card-bg: #141414; }
*{ margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; }
body{ background: var(--bg-dark); color:#fff; overflow-x: hidden; min-height: 100vh; }
.container{ max-width: 500px; margin: auto; padding: 20px; text-align: center; }
.brand-header { margin: 40px 0 30px; }
.brand-header h1 { font-size: 32px; letter-spacing: 1px; font-weight: 700; }
.brand-header h1 span { color: var(--accent-blue); }
.brand-header p { font-size: 10px; letter-spacing: 3px; color: #888; text-transform: uppercase; margin-top: 5px; }
.input-section { display: flex; gap: 10px; margin-bottom: 15px; }
input { flex: 3; background: #111; border: 1px solid #222; padding: 15px; border-radius: 12px; color: white; font-size: 14px; }
select { flex: 1; background: #111; border: 1px solid #222; padding: 10px; border-radius: 12px; color: white; }
.grid-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
.reveal-btn { width: 100%; background: var(--gold); color: #000; font-weight: 700; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-size: 16px; display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.3s; }
.action-btn { background: #1a1a1a; color: #fff; padding: 10px 18px; border-radius: 10px; border: 1px solid #333; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 8px; flex-grow: 1; }
.reveal-btn:active, .action-btn:active { transform: scale(0.98); }
.display-card { background: var(--card-bg); border-radius: 25px; padding: 40px 20px; margin-top: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); min-height: 300px; }
#textOutput { font-family: 'Playfair Display', serif; font-size: 26px; line-height: 1.4; margin-bottom: 20px; transition: 0.5s ease; }
#refOutput { color: var(--accent-blue); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; font-size: 14px; }
.insight-box { background: linear-gradient(145deg, #0d1b2a, #070707); border-left: 3px solid var(--accent-blue); padding: 20px; border-radius: 12px; margin-top: 30px; text-align: left; display: none; animation: slideIn 0.4s ease-out; }
.insight-header { color: #f7ef8a; font-size: 11px; font-weight: bold; margin-bottom: 10px; letter-spacing: 1px; }
.fs-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 50px; text-align: center; }
.fs-exit { position: absolute; top: 30px; right: 30px; background: #fff; color: #000; padding: 8px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
.fs-controls { position: absolute; bottom: 50px; display: flex; gap: 30px; }
.fs-controls button { background: transparent; color: white; border: 1px solid #444; padding: 12px 25px; border-radius: 30px; cursor: pointer; }
footer { margin-top: 60px; padding-bottom: 40px; font-size: 11px; color: #444; line-height: 1.8; }
@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="container">
    <div class="brand-header">
        <h1>AltarFlow <span>Elite</span></h1>
        <p>Sovereign Theological Intelligence</p>
    </div>
    <div class="input-section">
        <input id="vInput" placeholder="Enter Reference (e.g. Amos 2:11)" value="John 1:1">
        <select id="vVersion">
            <option value="kjv">KJV</option>
            <option value="web">WEB</option>
        </select>
    </div>
    <button class="reveal-btn" onclick="fetchVerse()">⚡ Reveal</button>
    <div class="grid-actions">
        <button class="action-btn" onclick="startVoice()">🎤 Voice</button>
        <button class="action-btn" onclick="toggleInsight()">📖 Interpretation</button>
        <button class="action-btn" onclick="enterFS()">📺 Fullscreen</button>
        <button class="action-btn" onclick="copyVerse()">📋 Copy</button>
        <button class="action-btn" onclick="window.location.href='sermon_builder.html'" style="border: 1px solid #d4af37;">🏛️ Sermon Architect</button>
    </div>
    <div class="display-card">
        <div id="textOutput">"Behold, I make all things new."</div>
        <div id="refOutput">ALTARFLOW SOVEREIGN 2026</div>
        <div id="insightBox" class="insight-box">
            <div class="insight-header">✨ DIVINE INSIGHT & INTERPRETATION</div>
            <div id="insightText" style="font-size: 13px; color: #ccc; line-height: 1.6;"></div>
        </div>
    </div>
    <footer>
        © 2026 BODY OF CHRIST INTL | SOVEREIGN JURISDICTION<br>
        <span style="color:var(--accent-blue); font-style: italic; letter-spacing: 1px;">Architect: Kyrie Chirombedzi</span>
    </footer>
</div>
<div id="fsOverlay" class="fs-overlay">
    <div class="fs-exit" onclick="exitFS()">EXIT</div>
    <div id="fsMainText" style="font-family: 'Playfair Display', serif; font-size: 45px; margin-bottom: 30px;"></div>
    <div id="fsMainRef" class="reference-text" style="color: var(--accent-blue); font-weight: bold; letter-spacing: 3px;"></div>
    <div class="fs-controls">
        <button onclick="navVerse(-1)">PREVIOUS</button>
        <button onclick="navVerse(1)">NEXT VERSE</button>
    </div>
</div>
<script>
let currentVerse = null;
async function fetchVerse(manualQuery) {
    const query = manualQuery || document.getElementById('vInput').value;
    const version = document.getElementById('vVersion').value;
    document.getElementById('textOutput').style.opacity = "0.5";
    try {
        const response = await fetch(`https://bible-api.com/${encodeURIComponent(query)}?translation=${version}`);
        const data = await response.json();
        if(data.text) { currentVerse = data; updateDisplay(data); generateInsight(data); }
        else { document.getElementById('textOutput').innerText = "Reference Not Found."; }
    } catch(err) { document.getElementById('textOutput').innerText = "Connection Error."; }
    document.getElementById('textOutput').style.opacity = "1";
}
function updateDisplay(data) {
    const cleanText = `"${data.text.trim()}"`;
    document.getElementById('textOutput').innerText = cleanText;
    document.getElementById('refOutput').innerText = data.reference;
    document.getElementById('fsMainText').innerText = cleanText;
    document.getElementById('fsMainRef').innerText = data.reference;
}
function generateInsight(data) {
    const v = data.verses[0];
    const text = data.text.toLowerCase();
    const book = v.book_name;
    let context = "";
    if (text.includes("beginning") || text.includes("word") || text.includes("created")) { context = "Reveals the Protological Authority of Christ. Everything manifested began as a Spiritual Decree."; }
    else if (text.includes("faith") || text.includes("believe")) { context = "A revelation of Covenant Trust. Highlighting alignment of conviction with Divine Promise."; }
    else { context = `This passage in ${book} serves as a foundation for living a life of alignment with the Creator's purpose.`; }
    document.getElementById('insightText').innerHTML = `${context}<br><br><i>Study Note: Observe the verbs in this verse.</i>`;
}
function navVerse(step) { if(!currentVerse) return; const v = currentVerse.verses[0]; fetchVerse(`${v.book_name} ${v.chapter}:${v.verse + step}`); }
function toggleInsight() { const box = document.getElementById('insightBox'); box.style.display = (box.style.display === 'block') ? 'none' : 'block'; }
function enterFS() { document.getElementById('fsOverlay').style.display = 'flex'; }
function exitFS() { document.getElementById('fsOverlay').style.display = 'none'; }
function copyVerse() { const text = `${document.getElementById('textOutput').innerText} - ${document.getElementById('refOutput').innerText}`; navigator.clipboard.writeText(text); }
function startVoice() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SpeechRecognition) return;
    const rec = new SpeechRecognition();
    document.getElementById('textOutput').innerText = "Listening...";
    rec.onresult = (e) => {
        let t = e.results[0][0].transcript.toLowerCase().replace(/one/g, "1").replace(/two/g, "2").replace(/three/g, "3").replace(/four/g, "4").replace(/five/g, "5").replace(/six/g, "6").replace(/seven/g, "7").replace(/eight/g, "8").replace(/nine/g, "9").replace(/ten/g, "10").replace(/ verse /g, ":").replace(/ chapter /g, " ");
        document.getElementById('vInput').value = t;
        fetchVerse(t);
    };
    rec.start();
}
</script>
</body>
</html>
